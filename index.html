<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porfolio - Daniela García</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        html.lenis, html.lenis body { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }

        :root {
            --color-fondo-pagina: #F7D7D7; 
            --color-margenes: #1A2E26;     
            --color-titulos: #1A2E26;      
            --color-acentos: #F3B5B5;      
            --color-texto: #333333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-margenes);
            color: var(--color-texto);
            overflow-x: hidden;
        }

        .main-wrapper {
            background-color: var(--color-fondo-pagina);
            max-width: 1250px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        #mobile-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            background-color: var(--color-margenes);
        }
        #mobile-menu.open {
            transform: translateX(0);
        }

        .timeline-dot.active {
            background-color: var(--color-margenes);
            transform: scale(1.3);
            border: 2px solid white;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .top-banner {
            background-color: var(--color-margenes);
            text-align: center;
            padding: 8px 0;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #F7D7D7;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn-principal {
            background-color: var(--color-acentos);
            color: var(--color-titulos);
            transition: all 0.3s ease;
        }

        .contact-card {
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: transform 0.3s ease;
            width: 100%;
        }

        .profile-img-container img {
            object-fit: cover;
            object-position: 50% 25%;
            transform: scale(1.4);
        }

        .skill-card {
            background: white;
            padding: 1rem;
            border-radius: 1.25rem;
            text-align: center;
            font-weight: 700;
            color: var(--color-titulos);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
        }
    </style>
</head>
<body class="antialiased">

    <div class="top-banner fixed top-0 w-full z-[60]">
        ¡Hola! Bienvenido/a a mi espacio
    </div>

    <div class="main-wrapper shadow-2xl overflow-hidden">
        
        <button id="menu-toggle" class="fixed top-12 right-8 md:right-16 z-[70] bg-[#1A2E26] text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform">
            <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            </svg>
        </button>

        <div id="mobile-menu" class="fixed inset-0 z-[65] flex flex-col items-center justify-center space-y-8 text-[#F7D7D7] text-2xl font-light">
            <a href="#inicio" class="nav-link hover:opacity-70 transition-opacity">Inicio</a>
            <a href="#sobre-mi" class="nav-link hover:opacity-70 transition-opacity">Sobre Mí</a>
            <a href="#experiencia" class="nav-link hover:opacity-70 transition-opacity">Recorrido</a>
            <a href="#proyectos" class="nav-link hover:opacity-70 transition-opacity">Proyectos</a>
            <a href="#contacto" class="nav-link btn-principal px-10 py-3 rounded-full text-lg font-bold mt-4 shadow-xl">Contacto</a>
        </div>

        <main class="px-6 md:px-24 pt-32 pb-0 relative z-10">
            
            <section id="inicio" class="flex flex-col-reverse md:flex-row items-center justify-between gap-12 mb-32">
                <div class="flex-1 space-y-6 text-center md:text-left">
                    <h1 class="text-4xl md:text-7xl font-bold leading-tight">
                        <span class="block opacity-80" id="typewriter" style="color: var(--color-titulos);"></span>
                    </h1>
                    <p class="text-base md:text-lg text-gray-700 font-medium max-w-2xl">
                        Estudiante de doble grado en <span class="text-[#1A2E26] font-bold">Marketing y Publicidad + Periodismo</span>.
                    </p>
                    <div class="pt-4 flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                        <a href="#proyectos" class="btn-principal px-8 py-3 rounded-xl font-bold shadow-lg">Ver Proyectos</a>
                    </div>
                </div>
                <div class="w-56 h-56 md:w-96 md:h-96 shrink-0 relative">
                    <div class="absolute inset-0 bg-[#1A2E26] rounded-[3rem] transform rotate-6 opacity-20"></div>
                    <div class="absolute inset-0 bg-white rounded-[3rem] shadow-2xl overflow-hidden border-8 border-white profile-img-container">
                        <img src="assets/perfil.jpg" alt="Daniela García" class="w-full h-full grayscale hover:grayscale-0 transition-all duration-700">
                    </div>
                </div>
            </section>

            <section id="experiencia" class="mb-32 scroll-mt-24 reveal">
                <h2 class="text-3xl md:text-4xl font-bold mb-10">Trayectoria Académica</h2>
                <div class="bg-white/40 p-6 md:p-12 rounded-[2.5rem] shadow-inner border border-white/20 flex flex-col md:flex-row gap-12">
                    <div class="md:w-1/3 relative border-l-4 border-[#1A2E26]/20 ml-4 md:ml-0" id="timeline-container"></div>
                    <div class="md:w-2/3 bg-white/80 rounded-3xl p-6 md:p-8 min-h-[300px] flex flex-col justify-center shadow-lg" id="experience-detail">
                    </div>
                </div>
            </section>

            <section id="proyectos" class="mb-32 scroll-mt-24 reveal">
                <h2 class="text-3xl md:text-4xl font-bold mb-12">Proyectos Destacados</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8" id="projects-grid"></div>
            </section>

            <section id="contacto" class="py-12 md:py-20 scroll-mt-24 reveal bg-white/40 rounded-[2.5rem] p-6 md:p-12 mb-20 text-center">
                <h2 class="text-4xl font-extrabold text-[#1A2E26] mb-6">¿Caminamos juntos?</h2>
                <p class="font-bold text-xl">dannielaagaarciaa@gmail.com</p>
            </section>
        </main>
    </div>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Menú
        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        menuToggle.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
        });

        // Efecto Escritura
        const studentName = "Daniela García";
        const typewriterEl = document.getElementById('typewriter');
        let charIndex = 0;
        function typeWriter() {
            if (charIndex < studentName.length) {
                typewriterEl.innerHTML += studentName.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 120);
            }
        }
        setTimeout(typeWriter, 500);

        // Experiencia
        const experiences = [
            { id: 1, date: "2023 - Actualidad", title: "Doble Grado MKT y Periodismo", subtitle: "CESINE Business School", icon: "🎓", description: "Enfoque práctico en gestión de marca y narrativa mediática.", skills: ["Estrategia", "Comunicación"] },
            { id: 2, date: "2025 - 2026", title: "Erasmus International", subtitle: "Amsterdam AUAS", icon: "🇳🇱", description: "Marketing internacional y tendencias europeas.", skills: ["Intercultural"] }
        ];

        const timelineContainer = document.getElementById('timeline-container');
        const detailContainer = document.getElementById('experience-detail');

        function showExperienceDetail(id) {
            const exp = experiences.find(e => e.id === id);
            detailContainer.innerHTML = `
                <div class="flex items-center gap-4 mb-4">
                    <div class="text-4xl">${exp.icon}</div>
                    <div>
                        <h3 class="font-black text-xl text-[#1A2E26]">${exp.title}</h3>
                        <p class="text-xs uppercase font-bold opacity-60">${exp.subtitle}</p>
                    </div>
                </div>
                <p class="text-gray-700 font-medium mb-4">${exp.description}</p>
            `;
        }

        experiences.forEach(exp => {
            const dot = document.createElement('div');
            dot.className = "pl-8 pb-8 cursor-pointer relative";
            dot.innerHTML = `<div class="absolute left-[-10px] top-1 w-4 h-4 bg-[#1A2E26] rounded-full"></div>
                             <p class="text-[10px] font-bold opacity-50">${exp.date}</p>
                             <p class="font-bold text-sm">${exp.title}</p>`;
            dot.onclick = () => showExperienceDetail(exp.id);
            timelineContainer.appendChild(dot);
        });
        showExperienceDetail(1);

        // PROYECTOS CON RUTAS CORREGIDAS
        const projects = [
            { id: 1, title: "Diseño Artículo Revista", icon: "🎨", desc: "Adobe InDesign.", link: "TRABAJOS PUBLI/EXAMEN DANIELA GARCÍA DISEÑO.pdf" },
            { id: 2, title: "TFC Periodismo", icon: "📰", desc: "Metodología periodística.", link: "TRABAJOS PERIODISMO/TFC METODOLOGÍA PERIODÍSTICA DANIELA GARCÍA.pdf" },
            { id: 3, title: "Union Share Erasmus", icon: "🌍", desc: "Desarrollo en Shopify.", link: "TRABAJOS ERASMUS/Union share - report ppt.pdf" },
            { id: 4, title: "Estrategia Alegauto", icon: "🏎️", desc: "Marketing de seguros.", link: "TRABAJOS PUBLI/PRESENTACIÓN ALEGAUTO FINAL.pdf" },
            { id: 5, title: "Campaña RedBull", icon: "👐", desc: "Creatividad visual.", link: "TRABAJOS PUBLI/Campaña RedBull_Daniela García.pdf" }
        ];

        const grid = document.getElementById('projects-grid');
        projects.forEach(p => {
            grid.innerHTML += `
                <div class="bg-white p-8 rounded-[2rem] shadow-sm hover:shadow-xl transition-all">
                    <div class="text-4xl mb-4">${p.icon}</div>
                    <h3 class="font-black text-lg mb-2">${p.title}</h3>
                    <p class="text-xs text-gray-500 mb-6">${p.desc}</p>
                    <a href="${p.link}" target="_blank" class="text-[#F3B5B5] font-black uppercase text-[10px] tracking-widest">Ver Proyecto →</a>
                </div>`;
        });

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(r => revealObserver.observe(r));

    </script>
</body>
</html>
